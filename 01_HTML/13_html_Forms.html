<form action="backend.html" method="post">
  <h1>Sign in</h1>

  <div>

    <input type="email" id="email input">

<form>
  <h1>Student Registation</h1>

  <div>
    <label for="input id">Student ID:</label>
    <br>
    <input type="text" id="input id" name="input id" placeholder="eg:S001">
  </div>


  <div>
    <label for="first name input">First Name:</label>
    <br>
    <input type="text" id="first name input" name="input first name" placeholder="eg:Adeesha">
  </div>


  <div>
    <label for="last name input">Last Name:</label>
    <br>
    <input type="text" id="last name input" name="input last name" placeholder="eg:Ravindu">
  </div>


  <div>
    <label for="DOB">DOB:</label>
    <br>
    <input type="date" id="DOB" name="date of birth">
  </div>


  <div>
    <label for="input age">Age:</label>
    <br>
    <input type="number" id="input age" name="age" placeholder="eg:22">
  </div>


  <div>
    <label for="input address">Address:</label>
    <br>
    <!--<input type="text" id="input address" name="address" placeholder="eg:Panadura">-->
    <textarea id="input address" name="address" placeholder="eg:Panadura" ></textarea>
  </div>

  <br>
  <br>

  <div>
    <label for="program type">Program:</label>
    <select id="program type">
      <optgroup label="Undergraduate Students">
        <option value="">CMJD</option>
        <option value="">HDSE</option>
        <option value="">Univercity of </option>
        <option value="">Univercity of </option>
      </optgroup>

      <optgroup label="Graduate Student">
        <option value="">Data Science</option>
        <option value="">Data Science</option>
        <option value="">AI</option>
      </optgroup>
    </select>
  </div>

  <div>
    <br>
    <label>Entry Requirement</label>
    <br>
    <input type="checkbox" id="ol"><label for="ol">O/L</label>
    <br>
    <input type="checkbox" id="al"><label for="al">A/L</label>
  </div>

  <div>
    <br>
    <label>Entry Gender</label>
    <br>
    <input type="radio" id="male" name="gender"><label for="male">Male</label>
    <input type="radio" id="female" name="gender"><label for="female">Female</label>
    <input type="radio" id="other" name="gender"><label for="other">Other</label>
  </div>

  <br>

  <div>
    <!--<input type="submit" value="Submit">-->
    <button type="submit">Submit</button>

    <!--<input type="button" value="Update">-->
    <button type="button">Update</button>

    <!--<input type="button" value="Delete">-->
    <button type="button">Delete</button>

    <!--<input type="button" value="Reset">-->
    <button type="reset">Reset</button>
  </div>

</form>
