<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Flex Layout</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <link rel="stylesheet" href="assets/lib/normalize.css">

    <style>

        section {
            width: 1000px;
            height: 300px;
            border: 5px solid red;
            display: flex;
            justify-content: space-evenly;
        }

        section > div {
            width: 100px;
            height: 100px;
            background-color: deeppink;
            border: 2px solid dodgerblue;

            box-shadow: 0px 0px 20px 0px purple;
        }

        section > div:nth-child(2) {
            align-self: center;
        }

        section > div:nth-child(3) {
            align-self: end;
        }

        section > div:nth-child(4) {
            align-self: center;
        }

        section > div:nth-child(6) {
            align-self: center;
        }

    </style>

</head>

<body>


    <section>

        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>

    </section>


</body>

</html>
