<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Flex Layout</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <link rel="stylesheet" href="assets/lib/normalize.css">

    <style>

        /*

    There are 2 types of elements
        1. Block level elements
        2. Inline level elements

    Box types
    ---------
    1. Block
    > Content is distributed as a block
    > get 100% parent's width
    > vertically
    > box model applies
    > h1 {display: block}

    2. Inline
    > Content is distributed as a line
    > Only get content width
    > horizontally - No line breaks
    > No height and width (auto x auto)
    > h1 {display: inline}

    3. Inline-block
    > a mix of block and inline
    > Only get content width
    > horizontally - No line breaks
    > box model applies
    > h1 {display: inline-block}

    */

        div {
            display: inline;
        }

        span {
            display: block;
        }

    </style>

</head>

<body>


<!-- block level elements -->
    <div>A</div>
    <div>B</div>

<!-- inline level elements -->
    <span>A</span>
    <span>B</span>


</body>

</html>
