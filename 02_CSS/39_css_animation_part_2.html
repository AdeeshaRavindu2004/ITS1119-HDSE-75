<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>

    <link rel="stylesheet" href="../assets/lib/normalize.css">

    <style>

        div {
            width: 100px;
            aspect-ratio: 1/1;
            background: yellow;
            border: 4px solid black;

            animation-name: myanimation;
            /*animation-duration: 10000ms;*/

            /*animation-delay: 10000ms;*/
            /*animation-timing-function: linear; !* ease-in, ease-out, ease-in-out, linear *!*/

            /*animation-direction: normal; !* normal, reverse *!*/

            animation-duration: 10000ms;
            /*animation-iteration-count: 3;*/
            animation-iteration-count: infinite;
            animation-direction: alternate-reverse; /* normal, reverse, alternate, alternate */
        }

        @keyframes myanimation { /* myanimation = animation name */
            from { /* Keyframe 01 - Start */
                background: red;
                margin-left: 0;
            }
            to { /* Keyframe 02 - End */
                background: blue;
                margin-left: 1000px;
            }
        }

    </style>

</head>
<body>

    <div></div>

</body>
</html>
